name: Avisar a Vercel de cambios en el contenido

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy hook de Vercel
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          